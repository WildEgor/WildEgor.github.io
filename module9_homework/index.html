<body>
    <form id="f_form" class="forma">
        <div class="forma-wrapper"> 
            <label for="f_number" class="forma__label"> Enter number [0-10]:

            </label>
            <button class="forma__button button button-main"> SUBMIT </button>
        </div>
    </form>

    <div id="mySlider"></div>
    <div id="sliderNav">
        <div id="sliderPrev"><img src="images/prev-btn.png"></div>
        <div id="sliderNext"><img src="images/next-btn.png"></div>
    </div>
